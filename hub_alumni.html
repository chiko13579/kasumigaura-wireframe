<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .hub-card {
            display: block;
            text-decoration: none;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #333;
        }

        .hub-card:hover {
            transform: translateY(-5px);

        }

        .hub-img {
            height: 150px;
            background-color: #e2e2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #666;
            border-bottom: 3px solid #333;
        }

        .hub-content {
            padding: 20px;
        }

        .hub-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .hub-desc {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <header>
        <div class="top-header">
            <div class="top-nav-container">
                <div class="top-nav-list">
                    <a href="hub_admission.html">受験生の方へ</a>
                    <span class="top-nav-divider">|</span>
                    <a href="hub_parents.html">在校生・保護者の方へ</a>
                    <span class="top-nav-divider">|</span>
                    <a href="hub_alumni.html">卒業生の方へ</a>
                    <span class="top-nav-divider">|</span>
                    <a href="recruit.html">教員採用</a>
                    <span class="top-nav-divider">|</span>
                    <a href="alumni_assoc.html">同窓会</a>
                    <a href="contact.html" class="top-contact-btn">お問合せ</a>
                </div>
            </div>
        </div>
        <div class="main-header">
            <div class="container">
                <nav class="main-nav">
                    <div class="nav-item"><a href="index.html"><button>トップ</button></a></div>
                    <div class="nav-item"><a href="hub_admission.html"><button>受験生の方へ</button></a></div>
                    <div class="nav-item"><a href="hub_parents.html"><button>在校生・保護者の方へ</button></a></div>
                    <div class="nav-item"><a href="hub_alumni.html"><button>卒業生の方へ</button></a></div>
                    <div class="nav-item"><a href="recruit.html"><button>教員採用</button></a></div>
                    <div class="nav-item"><a href="alumni_assoc.html"><button>同窓会</button></a></div>
                </nav>

            </div>
        </div>
        <div class="container" style="padding-top: 0;">
            <h1>卒業生の方へ</h1>

        </div>
    </header>

    <main class="container">
        <!-- 1. お問い合わせ / 各種申請 -->
        <section class="course-section" style="margin-top: 50px;">
            <h2 class="course-title"
                style="text-align: left; border-left: 5px solid #333; padding-left: 15px; margin-bottom: 30px;">
                各種申請・お問い合わせ</h2>
            <div class="hub-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">

                <a href="contact.html" class="hub-card">
                    <div class="hub-img" style="background-color: #eee; color: #333;">各種証明書発行</div>
                    <div class="hub-content">
                        <div class="hub-title">卒業証明書申請</div>
                        <div class="hub-desc">卒業証明書の発行手続きについてはこちらからお申し込みください。</div>
                    </div>
                </a>

                <a href="contact.html" class="hub-card">
                    <div class="hub-img" style="background-color: #eee; color: #333;">各種証明書発行</div>
                    <div class="hub-content">
                        <div class="hub-title">成績証明書申請</div>
                        <div class="hub-desc">成績証明書・調査書などの発行手続きについてはこちら。</div>
                    </div>
                </a>

                <a href="contact.html" class="hub-card">
                    <div class="hub-img" style="background-color: #eee; color: #333;">ご案内</div>
                    <div class="hub-content">
                        <div class="hub-title">料金・支払い案内</div>
                        <div class="hub-desc">各種証明書の発行にかかる手数料とお支払い方法のご案内です。</div>
                    </div>
                </a>

            </div>
        </section>
    </main>

    <footer>
        <div class="container">
        </div>
    </footer>

</body>
