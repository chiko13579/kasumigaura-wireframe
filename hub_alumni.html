<!DOCTYPE html>
<html lang="ja">

    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .hub-card {
            display: block;
            text-decoration: none;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #333;
        }

        .hub-card:hover {
            transform: translateY(-5px);

        }

        .hub-img {
            height: 150px;
            background-color: #e2e2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #666;
            border-bottom: 3px solid #333;
        }

        .hub-content {
            padding: 20px;
        }

        .hub-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .hub-desc {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>

                    <a href="hub_alumni.html">卒業生の方へ</a>
                    <span class="top-nav-divider">|</span>
                    <a href="recruit.html">教員採用</a>
                    <span class="top-nav-divider">|</span>
                    <a href="alumni_assoc.html">同窓会</a>
                    <a href="contact.html" class="top-contact-btn">お問合せ</a></div>
            </div>
        </div>
        <div class="main-header">
            <div class="container">
                                <nav class="main-nav">
                    <div class="nav-item"><a href="index.html"><button>トップ</button></a></div>
                    <div class="nav-item"><a href="hub_admission.html"><button>受験生の方へ</button></a></div>
                    <div class="nav-item"><a href="hub_parents.html"><button>在校生・保護者の方へ</button></a></div>
                    <div class="nav-item"><a href="hub_alumni.html"><button>卒業生の方へ</button></a></div>

                </nav>

        </div>
        <div class="container" style="padding-top: 0;">
            <h1>卒業生の方へ</h1>

        </div>
    </header>

    <main class="container">
        <section class="course-section">
            <div class="hub-grid" style="grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));">


                <a href="contact.html" class="hub-card" style="border: 2px solid #333;">
                    <div class="hub-img" style="background-color: #333; color: white;">お問い合わせ</div>
                    <div class="hub-content">
                        <div class="hub-title">総合お問い合わせ窓口</div>
                        <div class="hub-desc">同窓会に関するご連絡や、証明書申請以外に関する各種お問い合わせはこちらから承ります。</div>
                    </div>
                </a>

            </div>

        </section>
