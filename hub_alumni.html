<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-section {
            width: 100%;
            height: 350px;
            background-color: #e0e0e0;
            background-image: url('https://placehold.co/1920x400/dddddd/666666?text=Admission+Hero+Image');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 50px;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.4);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #333;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px 60px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .hero-title {
            font-size: 2.8em;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 0;
        }

        .hero-subtitle {
            font-size: 1.1em;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .hub-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #333;
            border: 1px solid #f0f0f0;
        }

        .hub-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .hub-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        .hub-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .hub-card:hover .hub-img-wrapper img {
            transform: scale(1.08);
        }

        .hub-content {
            padding: 30px 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .hub-title {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 12px;
            color: #222;
        }

        .hub-desc {
            font-size: 0.95em;
            color: #666;
            line-height: 1.7;
            flex-grow: 1;
        }

        .hub-action {
            margin-top: 20px;
            font-size: 0.9em;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .hub-action::after {
            content: '→';
            margin-left: 8px;
            transition: transform 0.3s;
        }

        .hub-card:hover .hub-action::after {
            transform: translateX(6px);
        }

        .modern-list-link:hover {
            background-color: #fafafa;
            padding-left: 20px !important;
        }

        .modern-list-link:hover .modern-arrow {
            transform: translateX(10px);
            color: #333;
        }
    </style>
</head>

                            <div style="display: flex; flex-direction: column; gap: 8px;">
